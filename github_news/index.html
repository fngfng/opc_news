<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Trending Hub - 每日 & 每周热门开源项目</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-glow: rgba(88, 166, 255, 0.15);
            --success: #3fb950;
            --warning: #d29922;
            --danger: #f85149;
            --gradient-1: #58a6ff;
            --gradient-2: #a371f7;
            --gradient-3: #f778ba;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; overflow-x: hidden; }
        .bg-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
        .bg-glow { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(100px); opacity: 0.08; pointer-events: none; z-index: 0; }
        .bg-glow-1 { top: -200px; left: -200px; background: var(--gradient-1); }
        .bg-glow-2 { bottom: -200px; right: -200px; background: var(--gradient-2); }

        header { position: sticky; top: 0; z-index: 100; background: rgba(13,17,23,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .header-content { max-width: 1400px; margin: 0 auto; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: white; box-shadow: 0 0 20px rgba(88,166,255,0.3); }
        .logo-text { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, var(--text-primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-sub { font-size: 0.75rem; color: var(--text-secondary); font-weight: 400; letter-spacing: 0.05em; }
        nav { display: flex; gap: 0.5rem; align-items: center; }
        .nav-btn { padding: 0.6rem 1.2rem; border: none; background: transparent; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
        .nav-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
        .nav-btn.active { color: var(--accent); background: var(--accent-glow); border: 1px solid rgba(88,166,255,0.3); }
        .live-indicator { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; color: var(--success); font-family: 'JetBrains Mono', monospace; }
        .live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        main { position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .hero { text-align: center; padding: 4rem 0 3rem; }
        .hero h1 { font-size: 3rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.2; }
        .hero h1 span { background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2), var(--gradient-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero p { font-size: 1.1rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 2rem; }
        .stats-bar { display: flex; justify-content: center; gap: 3rem; margin-top: 2rem; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 3rem 0 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .section-title { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 0.75rem; }
        .section-title i { color: var(--accent); }
        .update-time { font-size: 0.85rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }

        .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .filter-tab { padding: 0.5rem 1rem; border: 1px solid var(--border); background: var(--bg-secondary); color: var(--text-secondary); font-size: 0.85rem; font-weight: 500; border-radius: 20px; cursor: pointer; transition: all 0.3s ease; }
        .filter-tab:hover { border-color: var(--accent); color: var(--accent); }
        .filter-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.25rem; }
        .project-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .project-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gradient-1), var(--gradient-2)); opacity: 0; transition: opacity 0.3s ease; }
        .project-card:hover { transform: translateY(-4px); border-color: rgba(88,166,255,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(88,166,255,0.1); }
        .project-card:hover::before { opacity: 1; }
        .card-rank { position: absolute; top: 1rem; right: 1rem; font-size: 3rem; font-weight: 800; color: rgba(88,166,255,0.05); line-height: 1; font-family: 'JetBrains Mono', monospace; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .repo-info { display: flex; align-items: center; gap: 0.75rem; }
        .repo-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.9rem; color: var(--accent); border: 2px solid var(--border); }
        .repo-name { font-weight: 600; font-size: 1rem; color: var(--text-primary); text-decoration: none; }
        .repo-name:hover { color: var(--accent); }
        .repo-owner { font-size: 0.8rem; color: var(--text-secondary); }
        .badges { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; }
        .badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.7rem; font-size: 0.75rem; font-weight: 600; border-radius: 20px; font-family: 'JetBrains Mono', monospace; }
        .badge-hot { background: rgba(248,81,73,0.15); color: var(--danger); }
        .badge-trend { background: rgba(210,153,34,0.15); color: var(--warning); }
        .card-description { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .meta-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
        .lang-dot { width: 10px; height: 10px; border-radius: 50%; }

        .summary-toggle { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem; background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.2); border-radius: 8px; color: var(--accent); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 0.75rem; user-select: none; }
        .summary-toggle:hover { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); }
        .summary-toggle i { transition: transform 0.3s ease; font-size: 0.7rem; }
        .summary-toggle.expanded i { transform: rotate(180deg); }
        .summary-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; opacity: 0; }
        .summary-content.expanded { max-height: 500px; opacity: 1; padding-top: 1rem; }
        .summary-section { margin-bottom: 0.75rem; }
        .summary-section:last-child { margin-bottom: 0; }
        .summary-label { display: flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-bottom: 0.3rem; }
        .summary-text { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; padding-left: 1.25rem; border-left: 2px solid var(--border); }

        .card-footer { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
        .card-link { font-size: 0.8rem; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: color 0.3s ease; }
        .card-link:hover { color: var(--accent-hover); }

        .weekly-summary { background: linear-gradient(135deg, rgba(88,166,255,0.05), rgba(163,113,247,0.05)); border: 1px solid rgba(88,166,255,0.15); border-radius: 20px; padding: 2rem; margin-bottom: 2rem; }
        .weekly-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .weekly-stat-card { background: var(--bg-secondary); border-radius: 12px; padding: 1rem; text-align: center; border: 1px solid var(--border); }
        .weekly-stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        .weekly-stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .top-picks-list { display: flex; flex-direction: column; gap: 0.75rem; }
        .top-pick-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; background: var(--bg-secondary); border-radius: 10px; border: 1px solid var(--border); transition: all 0.3s ease; text-decoration: none; color: inherit; }
        .top-pick-item:hover { border-color: var(--accent); transform: translateX(4px); }
        .pick-rank { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .pick-info { flex: 1; min-width: 0; }
        .pick-name { font-weight: 600; font-size: 0.95rem; }
        .pick-desc { font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pick-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.2rem; flex-shrink: 0; }
        .pick-stars { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--warning); }
        .pick-days { font-size: 0.75rem; color: var(--text-muted); }
        .insights-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
        .insights-text { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.8; }

        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 0; gap: 1rem; }
        .loading-spinner { width: 48px; height: 48px; border: 3px solid var(--bg-tertiary); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-secondary); font-size: 0.9rem; }
        .error-container { text-align: center; padding: 4rem 0; }
        .error-icon { font-size: 3rem; color: var(--danger); margin-bottom: 1rem; }
        .error-text { color: var(--text-secondary); margin-bottom: 1rem; }
        .error-cmd { font-size: 0.85rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; background: var(--bg-secondary); padding: 0.5rem 1rem; border-radius: 6px; display: inline-block; }

        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-secondary); border: 1px solid var(--border); padding: 1rem 2rem; border-radius: 12px; color: var(--text-primary); font-weight: 500; z-index: 2000; opacity: 0; transition: all 0.4s ease; display: flex; align-items: center; gap: 0.75rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        footer { text-align: center; padding: 3rem 2rem; border-top: 1px solid var(--border); margin-top: 4rem; color: var(--text-muted); font-size: 0.85rem; }
        footer a { color: var(--accent); text-decoration: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border); }
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .project-grid { grid-template-columns: 1fr; }
            .stats-bar { gap: 1.5rem; }
            .header-content { padding: 1rem; }
            .nav-btn span { display: none; }
        }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .animate-in { animation: fadeIn 0.5s ease forwards; }
        .delay-1{animation-delay:0.1s}.delay-2{animation-delay:0.2s}.delay-3{animation-delay:0.3s}.delay-4{animation-delay:0.4s}.delay-5{animation-delay:0.5s}

        .btn-refresh {
            display: inline-flex; align-items: center; gap: 0.6rem;
            padding: 0.85rem 1.75rem; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            color: white; box-shadow: 0 4px 15px rgba(88,166,255,0.3);
        }
        .btn-refresh:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(88,166,255,0.4); }
        .btn-refresh:active { transform: translateY(0); }
        .btn-refresh:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-refresh .spin { animation: spin 1s linear infinite; }

        .refresh-log {
            margin-top: 1rem; padding: 1rem 1.5rem;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 10px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem; color: var(--text-secondary);
            text-align: left; white-space: pre-wrap; max-height: 160px;
            overflow-y: auto; display: none;
        }
        .refresh-log.visible { display: block; }

        .chart-toggle {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(210,153,34,0.08); border: 1px solid rgba(210,153,34,0.2);
            border-radius: 8px; color: var(--warning); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; margin-top: 0.5rem; user-select: none;
        }
        .chart-toggle:hover { background: rgba(210,153,34,0.15); border-color: rgba(210,153,34,0.4); }
        .chart-toggle i { transition: transform 0.3s ease; font-size: 0.7rem; }
        .chart-toggle.expanded i.chevron { transform: rotate(180deg); }

        .chart-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease; opacity: 0; }
        .chart-content.expanded { max-height: 400px; opacity: 1; padding-top: 0.75rem; }
        .chart-content img { width: 100%; border-radius: 8px; background: #fff; display: block; }
        .chart-content .chart-loading { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 1rem; }

        .pick-what { font-size: 0.8rem; color: var(--accent); margin-top: 0.3rem; line-height: 1.5;
            opacity: 0.85; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .btn-force {
            margin-left: 0.75rem; padding: 0.5rem 1rem;
            background: transparent; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-secondary); font-size: 0.85rem;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-force:hover { border-color: var(--warning); color: var(--warning); }

        .ai-summary-box {
            background: linear-gradient(135deg, rgba(88,166,255,0.06), rgba(163,113,247,0.06));
            border: 1px solid rgba(88,166,255,0.2); border-radius: 14px;
            padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
        }
        .ai-summary-label {
            font-size: 0.78rem; font-weight: 600; color: var(--accent);
            letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.6rem;
            display: flex; align-items: center; gap: 0.4rem;
        }
        .ai-summary-text { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.8; }

        .trend-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px,1fr)); gap: 1rem; margin: 1.5rem 0; }
        .trend-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
        .trend-card-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem; }
        .trend-card-body { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header>
        <div class="header-content">
            <a href="#" class="logo" onclick="showSection('daily');return false;">
                <div class="logo-icon"><i class="fab fa-github"></i></div>
                <div>
                    <div class="logo-text">Trending Hub</div>
                    <div class="logo-sub">GitHub 热门项目追踪</div>
                </div>
            </a>
            <nav>
                <button class="nav-btn active" onclick="showSection('daily')" id="nav-daily">
                    <i class="fas fa-fire"></i><span>每日热门</span>
                </button>
                <button class="nav-btn" onclick="showSection('weekly')" id="nav-weekly">
                    <i class="fas fa-calendar-week"></i><span>每周精选</span>
                </button>
                <div class="live-indicator"><span class="live-dot"></span><span>LIVE</span></div>
            </nav>
        </div>
    </header>

    <main>
        <div class="hero">
            <h1>发现 <span>GitHub</span> 上最火的开源项目</h1>
            <p>每日自动追踪真实 GitHub Trending，AI 生成中文解读，每周精选最具价值的开源项目。</p>
            <div style="margin-bottom:1.5rem;">
                <button class="btn-refresh" id="refresh-btn" onclick="manualRefresh(false)">
                    <i class="fas fa-sync-alt" id="refresh-icon"></i>
                    <span id="refresh-text">手动更新数据</span>
                </button>
                <button class="btn-force" id="force-btn" onclick="manualRefresh(true)" title="忽略缓存重新抓取">
                    <i class="fas fa-redo"></i> 强制刷新
                </button>
                <div class="refresh-log" id="refresh-log"></div>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="total-repos">--</div>
                    <div class="stat-label">收录项目</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="total-stars-today">--</div>
                    <div class="stat-label">今日新增星标</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="update-time">--</div>
                    <div class="stat-label">最后更新</div>
                </div>
            </div>
        </div>

        <div id="daily-section">
            <div class="section-header">
                <div class="section-title"><i class="fas fa-fire"></i>今日热门项目</div>
                <div class="update-time" id="daily-update-time">加载中...</div>
            </div>
            <div id="daily-summary-box"></div>
            <div class="filter-tabs" id="daily-filters">
                <button class="filter-tab active" data-lang="all">全部</button>
                <button class="filter-tab" data-lang="TypeScript">TypeScript</button>
                <button class="filter-tab" data-lang="Python">Python</button>
                <button class="filter-tab" data-lang="Rust">Rust</button>
                <button class="filter-tab" data-lang="Go">Go</button>
                <button class="filter-tab" data-lang="JavaScript">JavaScript</button>
            </div>
            <div id="daily-content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">正在加载今日热门...</div>
                </div>
            </div>
        </div>

        <div id="weekly-section" style="display:none;">
            <div class="section-header">
                <div class="section-title"><i class="fas fa-calendar-week"></i>本周精选总结</div>
                <div class="update-time" id="weekly-update-time">加载中...</div>
            </div>
            <div id="weekly-content">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">正在加载本周总结...</div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">
        <i id="toast-icon" class="fas fa-check-circle"></i>
        <span id="toast-message">加载成功</span>
    </div>

    <footer>
        <p>数据来源：GitHub Trending | AI 解读：DeepSeek | 每日自动更新</p>
        <p style="margin-top:0.5rem;font-size:0.75rem;">本网站仅展示公开数据，所有项目归原作者所有</p>
    </footer>

    <script>
        const langColors = {
            TypeScript:'#3178c6',Python:'#3572A5',Rust:'#dea584',Go:'#00ADD8',
            JavaScript:'#f1e05a',Java:'#b07219','C++':'#f34b7d',C:'#555555',
            Ruby:'#701516',Swift:'#ffac45',Kotlin:'#A97BFF',Vue:'#41b883',
            Shell:'#89e051',HTML:'#e34c26',CSS:'#563d7c',Dart:'#00B4AB',
            PHP:'#4F5D95',Zig:'#ec915c',Unknown:'#8b949e'
        };

        let dailyData = [];
        let weeklyData = null;
        let currentFilter = 'all';
        let expandedCards = new Set();

        document.addEventListener('DOMContentLoaded', () => {
            loadDaily();
            setupFilters();
        });

        async function loadDaily() {
            try {
                const res = await fetch('data/daily.json?t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const json = await res.json();
                dailyData = json.repos || [];
                renderDailySummary(json.daily_summary);
                renderDaily();
                updateStats(json);
                document.getElementById('daily-update-time').textContent = formatTime(json.generated_at);
                showToast('数据加载成功', 'success');
            } catch (e) {
                document.getElementById('daily-content').innerHTML = `
                    <div class="error-container">
                        <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="error-text">暂无数据，请先运行 pipeline 生成数据文件</div>
                        <div class="error-cmd">cd github_news/pipeline &amp;&amp; python run.py</div>
                    </div>`;
                showToast('数据文件不存在', 'error');
            }
        }

        function renderDailySummary(text) {
            const box = document.getElementById('daily-summary-box');
            if (!text) { box.innerHTML = ''; return; }
            box.innerHTML = `
            <div class="ai-summary-box animate-in">
                <div class="ai-summary-label"><i class="fas fa-robot"></i> AI 今日热点总结</div>
                <div class="ai-summary-text">${text}</div>
            </div>`;
        }

        async function loadWeekly() {
            try {
                const res = await fetch('data/weekly.json?t=' + Date.now());
                if (!res.ok) throw new Error('HTTP ' + res.status);
                weeklyData = await res.json();
                renderWeekly();
                document.getElementById('weekly-update-time').textContent = formatTime(weeklyData.generated_at);
            } catch (e) {
                document.getElementById('weekly-content').innerHTML = `
                    <div class="error-container">
                        <div class="error-icon"><i class="fas fa-inbox"></i></div>
                        <div class="error-text">暂无周报数据，需积累至少1天历史数据</div>
                    </div>`;
            }
        }

        function showSection(section) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-' + section).classList.add('active');
            document.getElementById('daily-section').style.display = section === 'daily' ? 'block' : 'none';
            document.getElementById('weekly-section').style.display = section === 'weekly' ? 'block' : 'none';
            if (section === 'weekly' && !weeklyData) loadWeekly();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setupFilters() {
            document.getElementById('daily-filters').addEventListener('click', e => {
                if (!e.target.classList.contains('filter-tab')) return;
                document.querySelectorAll('#daily-filters .filter-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.lang;
                renderDaily();
            });
        }

        function renderDaily() {
            const container = document.getElementById('daily-content');
            const filtered = currentFilter === 'all' ? dailyData : dailyData.filter(r => r.language === currentFilter);
            if (!filtered.length) {
                container.innerHTML = `<div class="error-container"><div class="error-icon"><i class="fas fa-inbox"></i></div><div class="error-text">该语言暂无热门项目</div></div>`;
                return;
            }
            container.innerHTML = `<div class="project-grid">${filtered.map((r, i) => cardHTML(r, i)).join('')}</div>`;
        }

        function cardHTML(repo, i) {
            const d = (i % 5) + 1;
            const s = repo.summary || {};
            const expanded = expandedCards.has(repo.rank);
            return `
            <div class="project-card animate-in delay-${d}">
                <div class="card-rank">#${repo.rank}</div>
                <div class="card-header">
                    <div class="repo-info">
                        <div class="repo-avatar">${(repo.owner||'?')[0].toUpperCase()}</div>
                        <div>
                            <a href="${repo.url}" target="_blank" class="repo-name">${repo.owner}/${repo.name}</a>
                            <div class="repo-owner">${repo.owner}</div>
                        </div>
                    </div>
                    <div class="badges">
                        ${repo.rank <= 5 ? `<span class="badge badge-hot"><i class="fas fa-fire"></i> HOT</span>` : ''}
                        ${repo.stars_today > 0 ? `<span class="badge badge-trend"><i class="fas fa-arrow-up"></i> +${fmt(repo.stars_today)}</span>` : ''}
                    </div>
                </div>
                <div class="card-description">${repo.description || '暂无描述'}</div>
                <div class="card-meta">
                    <span class="meta-item"><span class="lang-dot" style="background:${langColors[repo.language]||'#8b949e'}"></span>${repo.language||'Unknown'}</span>
                    <span class="meta-item"><i class="far fa-star"></i>${fmt(repo.stars)}</span>
                    <span class="meta-item"><i class="fas fa-code-branch"></i>${fmt(repo.forks)}</span>
                </div>
                ${s.what ? `
                <div class="summary-toggle${expanded?' expanded':''}" onclick="toggleSummary(event,${repo.rank})">
                    <i class="fas fa-chevron-down"></i><span>AI 项目解读</span>
                </div>
                <div class="summary-content${expanded?' expanded':''}" id="sum-${repo.rank}">
                    <div class="summary-section"><div class="summary-label"><i class="fas fa-cogs"></i>作者做了什么</div><div class="summary-text">${s.what}</div></div>
                    <div class="summary-section"><div class="summary-label"><i class="fas fa-bullseye"></i>方便干什么</div><div class="summary-text">${s.purpose}</div></div>
                    <div class="summary-section"><div class="summary-label"><i class="fas fa-map-marker-alt"></i>应用场景</div><div class="summary-text">${s.scene}</div></div>
                </div>` : ''}
                <div class="chart-toggle" onclick="toggleChart(event,'${repo.owner}','${repo.name}',${repo.rank})">
                    <i class="fas fa-chart-line"></i><span>星标趋势</span><i class="fas fa-chevron-down chevron"></i>
                </div>
                <div class="chart-content" id="chart-${repo.rank}">
                    <div class="chart-loading"><i class="fas fa-spinner fa-spin"></i> 加载中...</div>
                </div>
                <div class="card-footer">
                    <a href="${repo.url}" target="_blank" class="card-link"><i class="fab fa-github"></i> 查看仓库</a>
                </div>
            </div>`;
        }

        function toggleSummary(e, rank) {
            e.stopPropagation();
            const el = document.getElementById('sum-' + rank);
            const tog = e.currentTarget;
            if (expandedCards.has(rank)) {
                expandedCards.delete(rank);
                el.classList.remove('expanded');
                tog.classList.remove('expanded');
            } else {
                expandedCards.add(rank);
                el.classList.add('expanded');
                tog.classList.add('expanded');
            }
        }

        const expandedCharts = new Set();
        function toggleChart(e, owner, name, rank) {
            e.stopPropagation();
            const content = document.getElementById('chart-' + rank);
            const tog = e.currentTarget;
            if (expandedCharts.has(rank)) {
                expandedCharts.delete(rank);
                content.classList.remove('expanded');
                tog.classList.remove('expanded');
                return;
            }
            expandedCharts.add(rank);
            content.classList.add('expanded');
            tog.classList.add('expanded');

            // 已加载则不重复请求
            if (content.querySelector('img')) return;

            const key = owner + '-' + name;
            const localSrc = 'data/charts/' + key + '.svg';
            const img = new Image();
            img.onload = () => { content.innerHTML = ''; content.appendChild(img); };
            img.onerror = () => {
                // 本地缓存不存在，回退到 star-history.com
                img.onerror = () => { content.innerHTML = '<div class="chart-loading">暂无趋势图</div>'; };
                img.src = 'https://api.star-history.com/svg?repos=' + owner + '/' + name + '&type=Date';
            };
            img.src = localSrc;
            img.alt = owner + '/' + name + ' star history';
            img.style.cssText = 'width:100%;border-radius:8px;background:#fff;';
        }

        function renderWeekly() {
            const w = weeklyData;
            if (!w) return;
            const ins = (typeof w.insights === 'object' && w.insights) ? w.insights : null;
            const insStr = (typeof w.insights === 'string') ? w.insights : null;

            document.getElementById('weekly-content').innerHTML = `
            <div class="weekly-summary animate-in">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div style="font-size:1.25rem;font-weight:700;"><i class="fas fa-chart-pie" style="color:var(--accent);margin-right:0.5rem;"></i>本周数据概览</div>
                    <div style="font-size:0.85rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;">${w.week_range||''} · ${w.days_collected||1}天数据</div>
                </div>
                <div class="weekly-stats">
                    <div class="weekly-stat-card"><div class="weekly-stat-value">${w.total_projects||0}</div><div class="weekly-stat-label">热门项目</div></div>
                    <div class="weekly-stat-card"><div class="weekly-stat-value">${fmt(w.total_stars_today||0)}</div><div class="weekly-stat-label">累计今日增星</div></div>
                    <div class="weekly-stat-card"><div class="weekly-stat-value">${(w.top_languages||[]).length}</div><div class="weekly-stat-label">主要语言</div></div>
                    <div class="weekly-stat-card"><div class="weekly-stat-value">${(w.trending_topics||[]).length}</div><div class="weekly-stat-label">热门话题</div></div>
                </div>
                <div style="margin-bottom:1.5rem;">
                    <h3 style="font-size:1rem;margin-bottom:0.75rem;color:var(--text-secondary);"><i class="fas fa-tags" style="margin-right:0.5rem;"></i>热门话题</h3>
                    <div class="filter-tabs" style="margin-bottom:0;">
                        ${(w.trending_topics||[]).map(([t,c])=>`<span class="filter-tab" style="cursor:default;">${t} (${c})</span>`).join('')}
                    </div>
                </div>
                <div>
                    <h3 style="font-size:1rem;margin-bottom:0.75rem;color:var(--text-secondary);"><i class="fas fa-code" style="margin-right:0.5rem;"></i>语言分布</h3>
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;">
                        ${(w.top_languages||[]).map(([lang,cnt])=>`
                        <div style="display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;background:var(--bg-primary);border-radius:8px;border:1px solid var(--border);">
                            <span class="lang-dot" style="background:${langColors[lang]||'#8b949e'};width:12px;height:12px;"></span>
                            <span style="font-weight:600;">${lang}</span>
                            <span style="color:var(--text-secondary);font-size:0.85rem;">${cnt} 个</span>
                        </div>`).join('')}
                    </div>
                </div>
            </div>

            ${ins ? `
            <div class="section-header">
                <div class="section-title"><i class="fas fa-chart-line" style="color:var(--gradient-2);"></i>本周趋势深度分析</div>
            </div>
            <div class="trend-cards">
                <div class="trend-card">
                    <div class="trend-card-title" style="color:var(--danger);"><i class="fas fa-rocket"></i> 最热技术方向</div>
                    <div class="trend-card-body">${ins.hot_direction||''}</div>
                </div>
                <div class="trend-card">
                    <div class="trend-card-title" style="color:var(--accent);"><i class="fas fa-code"></i> 编程语言趋势</div>
                    <div class="trend-card-body">${ins.language_trend||''}</div>
                </div>
                <div class="trend-card">
                    <div class="trend-card-title" style="color:var(--warning);"><i class="fas fa-star"></i> 重点关注项目</div>
                    <div class="trend-card-body">${ins.notable_projects||''}</div>
                </div>
            </div>` : insStr ? `
            <div class="section-header">
                <div class="section-title"><i class="fas fa-lightbulb" style="color:var(--success);"></i>本周洞察</div>
            </div>
            <div class="insights-box"><div class="insights-text">${insStr}</div></div>` : ''}

            <div class="section-header">
                <div class="section-title"><i class="fas fa-trophy" style="color:var(--warning);"></i>本周 Top 10</div>
            </div>
            <div class="top-picks-list">
                ${(w.top_picks||[]).map((r,i)=>`
                <a class="top-pick-item animate-in delay-${(i%5)+1}" href="${r.url}" target="_blank">
                    <div class="pick-rank">${i+1}</div>
                    <div class="pick-info">
                        <div class="pick-name">${r.owner}/${r.name}</div>
                        <div class="pick-desc">${r.description||''}</div>
                        ${r.summary?.what ? `<div class="pick-what"><i class="fas fa-robot" style="font-size:0.7rem;margin-right:0.3rem;"></i>${r.summary.what}</div>` : ''}
                    </div>
                    <div class="pick-meta">
                        <div class="pick-stars"><i class="far fa-star"></i> ${fmt(r.stars)}</div>
                        ${r.appear_days>1?`<div class="pick-days">上榜 ${r.appear_days} 天</div>`:''}
                    </div>
                </a>`).join('')}
            </div>`;
        }

        function updateStats(json) {
            const repos = json.repos || [];
            document.getElementById('total-repos').textContent = repos.length;
            const starsToday = repos.reduce((s,r) => s + (r.stars_today||0), 0);
            document.getElementById('total-stars-today').textContent = fmt(starsToday);
            document.getElementById('update-time').textContent = formatTime(json.generated_at, true);
        }

        function fmt(n) {
            if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
            if (n >= 1000) return (n/1000).toFixed(1)+'k';
            return String(n||0);
        }

        function formatTime(iso, short=false) {
            if (!iso) return '--';
            const d = new Date(iso);
            return short
                ? d.toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})
                : d.toLocaleString('zh-CN');
        }

        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            document.getElementById('toast-icon').className = type==='success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            document.getElementById('toast-message').textContent = msg;
            t.className = 'toast ' + type;
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function manualRefresh(force = false) {
            const btn = document.getElementById('refresh-btn');
            const forceBtn = document.getElementById('force-btn');
            const icon = document.getElementById('refresh-icon');
            const text = document.getElementById('refresh-text');
            const log = document.getElementById('refresh-log');

            btn.disabled = true;
            forceBtn.disabled = true;
            icon.classList.add('spin');
            text.textContent = force ? '强制更新中...' : '检查缓存...';
            log.textContent = force ? '正在强制重新抓取，预计 1-2 分钟...' : '正在检查今日数据...';
            log.classList.add('visible');

            try {
                const res = await fetch('/api/refresh?force=' + force, { method: 'POST' });
                const data = await res.json();

                if (data.status === 'cached') {
                    log.textContent = '✓ 已读取今日缓存数据';
                    showToast('今日数据已存在，读取缓存', 'success');
                    weeklyData = null;
                    loadDaily();
                } else if (data.status === 'running') {
                    log.textContent = data.message;
                    showToast(data.message, 'error');
                } else if (data.status === 'success') {
                    log.textContent = data.log || '完成';
                    showToast('数据更新成功，正在刷新...', 'success');
                    setTimeout(() => { weeklyData = null; loadDaily(); }, 800);
                } else {
                    log.textContent = data.log || data.message;
                    showToast('更新失败，请查看日志', 'error');
                }
            } catch (e) {
                log.textContent = '无法连接到服务器，请确认使用 python3 server.py 启动';
                log.classList.add('visible');
                showToast('连接失败', 'error');
            } finally {
                btn.disabled = false;
                forceBtn.disabled = false;
                icon.classList.remove('spin');
                text.textContent = '手动更新数据';
            }
        }

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key==='1') { e.preventDefault(); showSection('daily'); }
            if (e.ctrlKey && e.key==='2') { e.preventDefault(); showSection('weekly'); }
            if (e.ctrlKey && e.key==='r') { e.preventDefault(); manualRefresh(); }
        });
    </script>
</body>
</html>
