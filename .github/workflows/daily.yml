name: Daily Trending Pipeline & Deploy

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京 08:00，每天一次
  workflow_dispatch:

# 并发控制：同一时间只允许一个 run，新的会取消旧的
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r github_news/requirements.txt

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: cd github_news/pipeline && python run.py

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_news/data/
          git diff --cached --quiet || git commit -m "data: daily trending $(date '+%Y-%m-%d')"
          git push

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: github_news

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
